services:
  app:
    build: ./app
    container_name: lab-app
    environment:
      - APP_VERSION=1.0.0
    networks:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: lab-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge
